name: Wake up Streamlit App

on:
  schedule:
    # 6시간마다 한 번씩 실행 (UTC 기준)
    - cron: '0 */6 * * *'
  workflow_dispatch: # 수동으로도 실행 가능하게 설정

jobs:
  wake-up:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Create empty commit to wake up
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git commit --allow-empty -m "Auto-wake up: $(date)"
          git push
